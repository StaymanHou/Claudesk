[package]
name = "claudesk"
version = "0.1.0"
description = "macOS-only lite IDE for the daily Claude Code + Sublime Text workflow."
authors = ["Stayman"]
edition = "2021"

# See more keys and their definitions at https://doc.rust-lang.org/cargo/reference/manifest.html

[lib]
# The `_lib` suffix may seem redundant but it is necessary
# to make the lib name unique and wouldn't conflict with the bin name.
# This seems to be only an issue on Windows, see https://github.com/rust-lang/cargo/issues/8519
name = "claudesk_lib"
crate-type = ["staticlib", "cdylib", "rlib"]

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
tauri = { version = "2", features = [] }
tauri-plugin-opener = "2"
tauri-plugin-dialog = "2"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
thiserror = "2"
# WP7: PtyCcSession. Promoted from [dev-dependencies] (WP2 probe) to a production
# dependency now that the embedded CC terminal ships. base64 encodes PTY output
# bytes for the cc-output-<sid> event payload (Vec<u8> over IPC is a heavy JSON
# number array; base64 string is ~4x cheaper and atob-decodes on the frontend).
portable-pty = "0.9"
base64 = "0.22"

[dev-dependencies]
tempfile = "3"

